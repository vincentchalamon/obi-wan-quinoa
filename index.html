<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2F4A36">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Obi-Wan Quinoa</title>
<style>
  :root{
    --vert-fonce:#2F4A36;--vert-feuille:#6E9E5E;--vert-clair:#E7EEE0;
    --betterave:#A8455E;--betterave-clair:#F4E3E7;
    --encre:#25342A;--ardoise:#6B7468;--papier:#F4F6EF;--carte:#FFFFFF;--trait:#E2E7DA;
    --ombre:0 1px 3px rgba(37,52,42,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--papier);color:var(--encre);
    font-family:"Helvetica Neue",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-size:15px;line-height:1.55;}
  h2,h3{font-family:Georgia,"Iowan Old Style",Palatino,"Times New Roman",serif;color:var(--vert-fonce);margin:0;}

  /* ---------- Header (sobre, slim) ---------- */
  .app-header{position:sticky;top:0;z-index:20;background:var(--vert-fonce);color:#fff;
    padding:max(9px,env(safe-area-inset-top)) 16px 10px;box-shadow:var(--ombre);
    display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .app-header .brand{font-family:Georgia,serif;font-size:17px;font-weight:700;line-height:1.1;letter-spacing:.01em;}
  .app-header .slogan{font-size:11.5px;opacity:.82;margin-top:2px;font-style:italic;}
  .app-settings-btn{flex:0 0 auto;border:none;background:rgba(255,255,255,.14);color:#fff;
    width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .app-settings-btn svg{width:20px;height:20px;}
  .app-settings-btn:active{background:rgba(255,255,255,.28);}

  /* ---------- Planning ---------- */
  #planning{max-width:720px;margin:0 auto;padding:6px 16px calc(48px + env(safe-area-inset-bottom));}

  /* Marqueur de semaine — sobre, NON fixe, avant chaque début de semaine (actions Préparer/Courses) */
  .week-marker{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap;
    margin:28px 2px 14px;padding:0 2px 8px;border-bottom:1px solid var(--trait);scroll-margin-top:70px;}
  .week-marker:first-child{margin-top:10px;}
  .wm-name{font-family:Georgia,serif;font-size:15px;color:var(--vert-fonce);font-weight:700;}
  .courses-btn,.prep-btn{border:1px solid var(--vert-feuille);background:transparent;color:var(--vert-fonce);
    border-radius:20px;padding:5px 12px 5px 9px;font:inherit;font-size:12.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;}
  .courses-btn svg,.prep-btn svg{width:15px;height:15px;stroke:var(--vert-feuille);fill:none;stroke-width:1.7;}
  .courses-btn:active,.prep-btn:active{background:var(--vert-clair);}
  .wm-actions{display:flex;gap:8px;align-items:center;flex:0 0 auto;}

  .day-card{background:var(--carte);border:1px solid var(--trait);border-radius:12px;
    box-shadow:var(--ombre);margin-bottom:12px;overflow:hidden;scroll-margin-top:70px;}
  .day-card.passe{opacity:.5;}
  .day-card.today{border-color:var(--vert-feuille);box-shadow:0 0 0 1px var(--vert-feuille),var(--ombre);}
  .day-h{font-size:16px;padding:12px 15px 10px;display:flex;align-items:center;flex-wrap:wrap;gap:7px;border-bottom:1px solid var(--trait);}

  .repas-row{width:100%;display:grid;grid-template-columns:46px 1fr auto;align-items:center;gap:10px;
    padding:11px 14px;min-height:60px;border-left:4px solid var(--vert-feuille);cursor:pointer;
    user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}
  .repas-row + .repas-row{border-top:1px solid var(--trait);}
  .repas-row.soir{border-left-color:var(--betterave);}
  .repas-main:active{opacity:.6;}
  .repas-row-moment{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--vert-feuille);}
  .repas-row.soir .repas-row-moment{color:var(--betterave);}
  .repas-row-titre{font-size:14.5px;line-height:1.35;color:var(--encre);}
  .repas-row-meta{font-size:12px;color:var(--ardoise);margin-top:2px;display:block;}
  .frais-pill{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    color:var(--vert-feuille);border:1px solid var(--vert-feuille);border-radius:20px;padding:1px 7px;margin-left:6px;vertical-align:1px;}
  .row-action{flex:0 0 auto;width:30px;height:30px;border-radius:50%;border:1px solid var(--trait);background:#fff;
    color:var(--ardoise);font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .row-action:active{background:#F0F2EC;}
  .repas-row.supprime{opacity:.5;}
  .repas-row.supprime .repas-row-titre{text-decoration:line-through;}
  .repas-row.supprime .row-action{color:var(--vert-feuille);border-color:var(--vert-feuille);}
  .repas-vide{padding:16px 15px;color:var(--ardoise);font-size:13.5px;font-style:italic;}

  /* Drag'n'drop (appui long sur la ligne entière) */
  .repas-row.dragging{opacity:.35;}
  .repas-row.drop-target{background:var(--vert-clair);box-shadow:inset 0 0 0 2px var(--vert-feuille);}
  body.dragging-active{touch-action:none;user-select:none;-webkit-user-select:none;cursor:grabbing;}
  .drag-ghost{position:fixed;left:0;top:0;z-index:60;pointer-events:none;background:var(--carte);
    border:1px solid var(--vert-feuille);border-radius:10px;box-shadow:0 6px 20px rgba(37,52,42,.25);
    padding:8px 12px;font-size:14px;max-width:80vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ---------- Overlay ---------- */
  #overlay{position:fixed;inset:0;z-index:50;background:var(--papier);display:flex;flex-direction:column;}
  #overlay[hidden]{display:none;}
  .ov-head{position:sticky;top:0;background:var(--carte);border-bottom:1px solid var(--trait);
    display:flex;align-items:center;gap:10px;padding:max(10px,env(safe-area-inset-top)) 16px 10px;min-height:54px;}
  .ov-back{border:none;background:none;padding:6px;margin:-6px 0 -6px -6px;color:var(--vert-fonce);cursor:pointer;display:flex;}
  .ov-back svg{width:24px;height:24px;}
  .ov-title{font-family:Georgia,serif;font-size:17px;font-weight:700;color:var(--vert-fonce);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ov-body{overflow:auto;-webkit-overflow-scrolling:touch;padding:18px 16px calc(28px + env(safe-area-inset-bottom));max-width:720px;margin:0 auto;width:100%;}

  .recipe{background:var(--carte);border:1px solid var(--trait);border-radius:12px;box-shadow:var(--ombre);padding:20px 18px 22px;}
  .recipe-tag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    color:var(--vert-feuille);border:1px solid var(--vert-feuille);border-radius:20px;padding:3px 11px;margin-bottom:12px;}
  .recipe-tag.soir{color:var(--betterave);border-color:var(--betterave);}
  .recipe-titre{font-size:22px;line-height:1.2;margin-bottom:14px;}
  .recipe-img{width:100%;border-radius:10px;margin:0 0 16px;display:block;object-fit:cover;max-height:280px;}
  .recipe-src{margin:14px 0 0;font-size:13px;}
  .recipe-src a{color:var(--vert-feuille);}
  .macros{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
  .chip{font-size:12px;font-weight:700;padding:5px 11px;border-radius:7px;font-variant-numeric:tabular-nums;}
  .chip.kcal{background:var(--vert-clair);color:var(--vert-fonce);}
  .chip.prot{background:var(--betterave-clair);color:var(--betterave);}
  .chip.frais{background:#fff;color:var(--vert-feuille);border:1px solid var(--vert-feuille);}
  .recipe h3{font-family:"Helvetica Neue",sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ardoise);font-weight:700;margin:0 0 10px;}
  .recipe .bloc{margin-bottom:22px;}
  ul.ingr{list-style:none;margin:0;padding:0;}
  ul.ingr li{position:relative;padding:7px 0 7px 18px;border-bottom:1px dotted var(--trait);font-size:14px;}
  ul.ingr li:last-child{border-bottom:none;}
  ul.ingr li::before{content:"";position:absolute;left:0;top:14px;width:6px;height:6px;border-radius:50%;background:var(--vert-feuille);}
  .recipe.soir ul.ingr li::before{background:var(--betterave);}
  ol.etapes{list-style:none;margin:0;padding:0;counter-reset:step;}
  ol.etapes li{position:relative;padding:0 0 13px 34px;font-size:14px;}
  ol.etapes li:last-child{padding-bottom:0;}
  ol.etapes li::before{counter-increment:step;content:counter(step);position:absolute;left:0;top:-1px;width:23px;height:23px;border-radius:50%;
    background:var(--vert-fonce);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .recipe.soir ol.etapes li::before{background:var(--betterave);}
  .del-btn{margin-top:6px;width:100%;padding:13px;border-radius:10px;border:1px solid var(--trait);background:#fff;
    color:var(--betterave);font:inherit;font-weight:600;cursor:pointer;}
  .del-btn.is-del{color:var(--vert-fonce);border-color:var(--vert-feuille);background:var(--vert-clair);}
  /* Barre d'actions recette (icônes) : mode cuisine, partager, RecipeSage */
  .recipe-actions{display:flex;gap:8px;margin:0 0 22px;}
  .act-btn{flex:1 1 0;height:46px;border:1px solid var(--trait);background:#fff;border-radius:10px;
    color:var(--vert-fonce);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .act-btn svg{width:22px;height:22px;}
  .act-btn:active{background:var(--vert-clair);}
  .act-btn.is-on{background:var(--vert-feuille);border-color:var(--vert-feuille);color:#fff;}

  .hint{color:var(--ardoise);font-size:13px;margin:0 0 16px;}
  .rayon{background:var(--carte);border:1px solid var(--trait);border-radius:12px;box-shadow:var(--ombre);padding:6px 16px 8px;margin-bottom:14px;}
  .rayon h2{font-size:16px;display:flex;align-items:center;gap:9px;padding:11px 0 9px;border-bottom:2px solid var(--vert-clair);margin-bottom:2px;}
  .rayon h2 .pip{width:11px;height:11px;border-radius:3px;background:var(--vert-feuille);}
  .rayon.r-prot h2 .pip{background:var(--betterave);}
  .rayon.r-epi h2 .pip{background:#C9912F;}
  .rayon.r-fru h2 .pip{background:#D26A3B;}
  .rayon.r-con h2 .pip{background:#8A8F82;}
  .rayon.r-aut h2 .pip{background:#B0A48F;}
  .rayon ul{list-style:none;margin:0;padding:0;}
  .course-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px dotted var(--trait);cursor:pointer;font-size:14px;min-height:46px;}
  .course-item:last-child{border-bottom:none;}
  .course-item .check{flex:0 0 auto;width:21px;height:21px;border:2px solid var(--vert-feuille);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:background .12s;}
  .course-item .check svg{width:13px;height:13px;opacity:0;}
  .course-nom{flex:1 1 auto;}
  .course-q{color:var(--ardoise);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;}
  button.course-q.edit{border:none;background:none;font:inherit;cursor:pointer;padding:4px 6px;margin:-4px -6px;border-radius:7px;line-height:1.2;}
  button.course-q.edit:active{background:var(--vert-clair);}
  .course-q .q-need{display:block;font-size:10.5px;opacity:.7;}
  .q-edit{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
  .q-edit input{width:66px;font:inherit;font-size:14px;padding:4px 6px;border:1px solid var(--vert-feuille);border-radius:7px;text-align:right;-webkit-appearance:none;}
  .q-unit{font-size:12px;color:var(--ardoise);}
  .course-item.done .check{background:var(--vert-feuille);}
  .course-item.done .check svg{opacity:1;}
  .course-item.done .course-nom{text-decoration:line-through;color:var(--ardoise);}
  .course-item.done{opacity:.45;}   /* atténuer les articles cochés pour faire ressortir le reste */

  /* Bouton flottant : revenir à aujourd’hui */
  #today-fab{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));z-index:30;
    width:46px;height:46px;border-radius:50%;border:none;background:var(--vert-fonce);color:#fff;
    box-shadow:0 2px 8px rgba(37,52,42,.25);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  #today-fab svg{width:22px;height:22px;}
  #today-fab:active{background:var(--vert-feuille);}

  /* ---------- Écran « Préparer » + formulaires ---------- */
  .prep-note{color:var(--ardoise);font-size:13px;margin:0 0 16px;}
  .prep-week{font-weight:700;color:var(--vert-fonce);}
  .field{margin-bottom:16px;}
  .field > label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ardoise);margin-bottom:6px;}
  .field textarea,.field select{width:100%;font:inherit;font-size:15px;color:var(--encre);background:var(--carte);
    border:1px solid var(--trait);border-radius:10px;padding:10px 12px;-webkit-appearance:none;}
  .field textarea{min-height:96px;resize:vertical;line-height:1.5;}
  .field .row{display:flex;align-items:center;gap:8px;}
  .field .row input[type=checkbox]{width:18px;height:18px;}
  .field .row label{margin:0;text-transform:none;letter-spacing:0;font-weight:400;font-size:14px;color:var(--encre);}
  .btn-primary{width:100%;padding:14px;border-radius:10px;border:none;background:var(--vert-fonce);color:#fff;
    font:inherit;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px;}
  .btn-primary:active{background:var(--vert-feuille);}
  .btn-secondary{width:100%;padding:12px;border-radius:10px;border:1px solid var(--trait);background:#fff;
    color:var(--vert-fonce);font:inherit;font-weight:600;cursor:pointer;margin-top:10px;}
  .btn-secondary:active{background:var(--vert-clair);}
  .prep-ok{color:var(--vert-feuille);font-size:13px;text-align:center;margin-top:10px;min-height:18px;}
  /* Génération de menu (proposition RecipeSage) */
  .src-note{color:var(--ardoise);font-size:12.5px;margin:-8px 0 16px;}
  .src-note a{color:var(--vert-feuille);}
  .gen-day{margin-bottom:14px;}
  .gen-day-h{font-size:13px;font-weight:700;color:var(--vert-fonce);margin:0 0 6px;}
  .gen-repas{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dotted var(--trait);}
  .gen-moment{flex:0 0 auto;width:36px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--vert-feuille);}
  .gen-moment.soir{color:var(--betterave);}
  .gen-titre{flex:1 1 auto;color:var(--encre);text-decoration:none;font-size:14px;}
  .gen-titre:active{opacity:.6;}
  .gen-reroll{flex:0 0 auto;width:32px;height:32px;border-radius:50%;border:1px solid var(--trait);background:#fff;color:var(--vert-fonce);font-size:15px;cursor:pointer;}
  .gen-reroll:active{background:var(--vert-clair);}
  .gen-reroll svg{width:16px;height:16px;}
  .day-total{padding:8px 15px;font-size:12px;color:var(--ardoise);border-top:1px solid var(--trait);background:#FBFCF9;font-variant-numeric:tabular-nums;}
  /* Couverts (vue recette) */
  .couverts{display:flex;align-items:center;gap:10px;margin:0 0 20px;flex-wrap:wrap;}
  .couverts .cv-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ardoise);}
  .cv-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--trait);background:#fff;color:var(--vert-fonce);
    font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .cv-btn:active{background:var(--vert-clair);}
  .cv-val{min-width:20px;text-align:center;font-weight:700;font-variant-numeric:tabular-nums;}
  .cv-hint{font-size:12px;color:var(--ardoise);flex:1 1 100%;}
  #owq-status{background:var(--betterave-clair);color:var(--betterave);font-size:12.5px;text-align:center;padding:8px 14px;}
  #owq-status.ok{background:var(--vert-clair);color:var(--vert-fonce);}
  #owq-status[hidden]{display:none;}

  /* ---------- Desktop : deux volets (planning à gauche, détail ancré à droite) ---------- */
  .ov-placeholder{color:var(--ardoise);font-size:14px;text-align:center;margin:48px 8px 0;line-height:1.6;}
  @media (min-width:900px){
    :root{--panel-w:min(42vw,620px);}
    #planning{max-width:720px;margin:0;margin-right:var(--panel-w);padding-left:24px;}
    #overlay{position:fixed;inset:var(--head-h,56px) 0 0 auto;width:var(--panel-w);
      border-left:1px solid var(--trait);box-shadow:-2px 0 12px rgba(37,52,42,.05);}
    #overlay[hidden]{display:flex;}            /* panneau toujours visible sur desktop */
    .ov-body{max-width:none;}
    #today-fab{right:auto;left:16px;}          /* hors du panneau de droite */
  }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="brand">Obi-Wan Quinoa</div>
    <div class="slogan">Que la graine soit avec toi, padawan !</div>
  </div>
  <button id="owq-settings" class="app-settings-btn" aria-label="Réglages" title="Réglages"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
</header>
<div id="owq-status" hidden></div>

<main id="planning"></main>

<div id="overlay" hidden>
  <header class="ov-head">
    <button class="ov-back" aria-label="Retour"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <span class="ov-title"></span>
  </header>
  <div class="ov-body"></div>
</div>

<button id="today-fab" aria-label="Revenir à aujourd’hui" title="Aujourd’hui"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/></svg></button>

<script src="logic.js"></script>
<script src="recipesage.js"></script>
<script>
/* ============================================================
   OBI-WAN QUINOA
   Semaine alimentaire à début configurable (profil : weekStart, défaut jeudi = rythme AMAP).
   - Marqueur "Semaine du <début>" avant chaque début de semaine, avec les actions Préparer & Courses.
   - Menu et courses indexés par le premier jour de la semaine (wid = idOf(startOfWeek(d, weekStart))).
   - La liste de courses est CALCULÉE à partir des repas non supprimés, x couverts par repas.
   Données 100 % locales : catalogue et menus générés depuis le catalogue RecipeSage public de l'auteur
   (voir recipesage.js), stockés en localStorage (owq.recipes / owq.gen) et matérialisés au boot.
   ============================================================ */

/* champ shop : {n:nom, q:quantité|null, u:unité, r:rayon, note?}
   r ∈ prot|leg|epi|con|fru   ·   q=null => pas de cumul (condiment, à l'unité) */
/* Catalogue : recettes RecipeSage sélectionnées, en cache localStorage (voir rebuild()). */
let R = {};

/* midi/soir/resolveRepas/materializeMenus : voir logic.js (materializeMenus(raw, R)). */

/* Régimes proposés dans le profil (valeur = label RecipeSage, exploité par le générateur en phase 2) */
const DIETS=[["","Aucun"],["vegetarien","Végétarien"],["vegan","Vegan"]];

let RAW_MENUS = {}; /* menus générés bruts (avant matérialisation), clé = début de semaine ; base des overrides */
let MENUS = {};   /* menus matérialisés (recettes résolues) */

/* ============================ Dates ============================ */
/* MOIS/JOURS/pad/idOf/parseId/addDays/startOfWeek/fmt : voir logic.js. */
const today=(function(){const t=new Date();t.setHours(0,0,0,0);return t;})();

/* ============================ Persistance ============================ */
const store={mem:{},
  get(k){try{return localStorage.getItem(k);}catch(e){return (k in this.mem)?this.mem[k]:null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){this.mem[k]=v;}}};
function loadSet(k){const raw=store.get(k);if(!raw)return new Set();try{return new Set(JSON.parse(raw));}catch(e){return new Set();}}
function saveSet(k,s){store.set(k,JSON.stringify(Array.from(s)));}
const deleted=loadSet('owq.deleted');   // clés "wid:di-ri"
const coches=loadSet('owq.checked');    // clés "wid§rayon§nom"

/* ---- Profil utilisateur (régime, couverts par défaut, début de semaine) ---- */
function loadProfile(){ let p={}; const raw=store.get('owq.profile'); if(raw){ try{ p=JSON.parse(raw)||{}; }catch(e){ p={}; } }
  return { diet: p.diet||'', couverts: (p.couverts>=1?p.couverts:1), weekStart: (p.weekStart>=0&&p.weekStart<=6?p.weekStart:4) }; } /* défaut jeudi : rythme AMAP de l'auteur (modifiable dans le profil) */
function saveProfile(p){ store.set('owq.profile', JSON.stringify(p)); }
let profile=loadProfile();
function sow(d){ return startOfWeek(d, profile.weekStart); }   // début de semaine selon le profil

/* ---- Couverts par repas (override du défaut profil), clé "wid:di-ri" ---- */
function loadCouverts(){ const raw=store.get('owq.couverts'); if(!raw) return {}; try{ return JSON.parse(raw)||{}; }catch(e){ return {}; } }
let couvertsMap=loadCouverts();
function couvertsGet(wid,di,ri){ const k=wid+':'+di+'-'+ri; return (k in couvertsMap)?couvertsMap[k]:profile.couverts; }
function couvertsSet(wid,di,ri,val){ const k=wid+':'+di+'-'+ri; val=Math.max(1,Math.round(val||1));
  if(val===profile.couverts) delete couvertsMap[k]; else couvertsMap[k]=val;
  store.set('owq.couverts', JSON.stringify(couvertsMap)); }

/* ---- Catalogue RecipeSage sélectionné + menus générés (persistés localStorage, dispo hors-ligne) ---- */
function loadRecipesCache(){ const raw=store.get('owq.recipes'); if(!raw) return {}; try{ return JSON.parse(raw)||{}; }catch(e){ return {}; } }
function saveRecipesCache(o){ store.set('owq.recipes', JSON.stringify(o)); }
function loadGenMenus(){ const raw=store.get('owq.gen'); if(!raw) return {}; try{ return JSON.parse(raw)||{}; }catch(e){ return {}; } }
function saveGenMenus(o){ store.set('owq.gen', JSON.stringify(o)); }
/* Reconstruit le catalogue et les menus depuis le cache local (recettes RecipeSage sélectionnées + menus générés). */
function rebuild(){ R=loadRecipesCache();
  RAW_MENUS=loadGenMenus();
  MENUS=materializeMenus(applyOverrides(RAW_MENUS), R); }

/* ============================ Overrides de menu (édition à la volée) ============================ */
function loadOverrides(){ const raw=store.get('owq.menu'); if(!raw) return {}; try{ return JSON.parse(raw)||{}; }catch(e){ return {}; } }
function saveOverrides(o){ store.set('owq.menu', JSON.stringify(o)); }
/* Applique les overrides valides sur le brut ; purge ceux dont la source a changé (régénération Claude). */
function applyOverrides(raw){
  const ov=loadOverrides(); let changed=false; const eff={};
  Object.keys(raw).forEach(function(w){ eff[w]=raw[w]; });
  Object.keys(ov).forEach(function(w){
    if(raw[w] && ov[w].base===JSON.stringify(raw[w])){ eff[w]={jours:ov[w].jours}; }
    else { delete ov[w]; changed=true; }
  });
  if(changed) saveOverrides(ov);
  return eff;
}

/* ============================ Liste de courses calculée ============================ */
const RAYONS=[["prot","Protéines & laitages"],["leg","Légumes"],["epi","Épicerie & féculents"],["con","Condiments & épices"],["fru","Fruits"],["aut","Autres"]];
/* frac/qLabel/computeCourses : voir logic.js. Wrapper local pour l'app : */
function coursesFor(wid){ return computeCourses(MENUS[wid], wid, deleted, RAYONS, function(di,ri){ return couvertsGet(wid,di,ri); }); }

/* Quantités "à acheter" ajustées (j'ai déjà X, je n'achète que Y), par semaine.
   Réinitialisées à la régénération de la semaine (empreinte du brut, comme les overrides). */
function qtyKey(wid){ return 'owq.qty.'+wid; }
function loadQty(wid){ const raw=store.get(qtyKey(wid)); if(!raw) return {};
  let o; try{ o=JSON.parse(raw); }catch(e){ return {}; }
  if(!o || o.base!==JSON.stringify(RAW_MENUS[wid]||null)) return {};   // semaine régénérée -> reset
  return o.q||{}; }
function saveQty(wid,q){ store.set(qtyKey(wid), JSON.stringify({base:JSON.stringify(RAW_MENUS[wid]||null), q:q})); }
function qtyGet(wid,ck,need){ const q=loadQty(wid); return (ck in q)?q[ck]:need; }
function qtySet(wid,ck,val,need){ const q=loadQty(wid); if(val==null||val===need) delete q[ck]; else q[ck]=val; saveQty(wid,q); }

function nutriMeta(r){ const m=[];
  if(typeof r.kcal==='number') m.push('~'+r.kcal+' kcal');
  if(typeof r.prot==='number') m.push(r.prot+' g prot');
  return m; }
function repasRow(wid,di,ri,r){
  const key=wid+':'+di+'-'+ri, del=deleted.has(key), cv=couvertsGet(wid,di,ri);
  const meta=nutriMeta(r); if(cv>1) meta.push(cv+' couverts');
  return '<div class="repas-row '+(r.moment==='Soir'?'soir':'midi')+(del?' supprime':'')+'" data-key="'+key+'">'
    +'<span class="repas-main repas-row-moment">'+r.moment+'</span>'
    +'<span class="repas-main"><span class="repas-row-titre">'+r.titre+'</span>'
    +'<span class="repas-row-meta">'+meta.join(' · ')+(r.priorite?'<span class="frais-pill">frais</span>':'')+'</span></span>'
    +'<button class="row-action" data-action="toggle" aria-label="'+(del?'Rétablir':'Supprimer')+' ce repas">'+(del?'↩':'✕')+'</button>'
    +'</div>';
}
function dayTotal(kc,pr){ const parts=[];
  if(kc>0) parts.push('~'+Math.round(kc)+' kcal');
  if(pr>0) parts.push(Math.round(pr)+' g protéines');
  return parts.length ? '<div class="day-total">Total du jour '+parts.join(' · ')+'</div>' : ''; }
function dayCard(d){
  const ws=sow(d), wid=idOf(ws), menu=MENUS[wid];
  const di=Math.round((d-ws)/86400000);
  const past=d<today, isToday=(+d===+today);
  let h='<div class="day-card'+(past?' passe':'')+(isToday?' today':'')+'" id="day-'+idOf(d)+'">';
  h+='<div class="day-h">'+JOURS[d.getDay()]+' '+fmt(d)+'</div>';
  if(menu){ let kc=0,pr=0,n=0;
    menu.jours[di].repas.forEach(function(r,ri){ h+=repasRow(wid,di,ri,r);
      if(!deleted.has(wid+':'+di+'-'+ri)){ if(typeof r.kcal==='number')kc+=r.kcal; if(typeof r.prot==='number')pr+=r.prot; n++; } });
    if(n) h+=dayTotal(kc,pr); }
  else { h+='<div class="repas-vide">Menu à définir</div>'; }
  h+='</div>'; return h;
}
function renderDay(d){
  let h='';
  if(+d===+sow(d)){                                                            // premier jour de la semaine alimentaire : entête + actions
    const wid=idOf(d);
    h+='<div class="week-marker"><span class="wm-name">Semaine du '+fmt(d)+'</span>'
      +'<span class="wm-actions">'
      +'<button class="prep-btn" data-prepare="'+wid+'">'+PREPARE_SVG+'Générer</button>'
      +'<button class="courses-btn" data-courses="'+wid+'">'+COURSES_SVG+'Courses</button>'
      +'</span></div>';
  }
  h+=dayCard(d); return h;
}

let cursor=sow(today), daysRendered=0;
const MAX_DAYS=30*7;
function appendDays(n){ let h=''; for(let i=0;i<n && daysRendered<MAX_DAYS;i++){ h+=renderDay(cursor); cursor=addDays(cursor,1); daysRendered++; } planning.insertAdjacentHTML('beforeend',h); }

function boot(){
  rebuild();
  appendDays(21);
  const el = document.getElementById('day-'+idOf(today));
  if(el) el.scrollIntoView({block:'start'});
}
boot();

let loading=false;
window.addEventListener('scroll',function(){
  if(loading||daysRendered>=MAX_DAYS) return;
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-800){ loading=true; appendDays(7); setTimeout(function(){loading=false;},60); }
});

/* ============================ Mode cuisine (wake lock) ============================ */
let wakeLock=null, cookMode=false;
async function acquireWake(){ if(!('wakeLock' in navigator)) return; try{ wakeLock=await navigator.wakeLock.request('screen'); }catch(e){ wakeLock=null; } }
function releaseWake(){ if(wakeLock){ try{ wakeLock.release(); }catch(e){} wakeLock=null; } }
async function setCookMode(on){ cookMode=on; if(on) await acquireWake(); else releaseWake();
  const b=ovBody.querySelector('[data-cook]'); if(b){ b.setAttribute('aria-pressed',on?'true':'false'); b.classList.toggle('is-on',on); } }
/* Le système relâche le wake lock quand l'onglet passe en arrière-plan : le ré-acquérir au retour si le mode est actif. */
document.addEventListener('visibilitychange',function(){ if(!document.hidden && cookMode && !wakeLock) acquireWake(); });

/* ============================ Overlays ============================ */
/* Desktop (>=900px) : le détail s'affiche dans un panneau ancré à droite (deux volets),
   sans verrou de scroll ni empilement d'historique ; « fermer » = revenir au placeholder.
   Le planning reste dans le flux (scroll fenêtre) pour préserver le scroll infini. */
const mqDesktop=window.matchMedia('(min-width:900px)');
function isDesktop(){ return mqDesktop.matches; }
function setHeadH(){ const hh=document.querySelector('.app-header'); if(hh) document.documentElement.style.setProperty('--head-h',hh.offsetHeight+'px'); }
function showPlaceholder(){ if(cookMode) setCookMode(false); ovTitle.textContent='';
  ovBody.innerHTML='<p class="ov-placeholder">Sélectionne un repas pour voir la recette, ou « Courses » pour la liste.</p>';
  overlay.hidden=false; }
function openOverlay(){ overlay.hidden=false; ovBody.scrollTop=0;
  if(!isDesktop()){ document.body.style.overflow='hidden'; history.pushState({owqOverlay:true},''); } }
function closeOverlay(){ if(cookMode) setCookMode(false);
  if(isDesktop()){ showPlaceholder(); return; }
  overlay.hidden=true; document.body.style.overflow=''; }
overlay.querySelector('.ov-back').addEventListener('click',function(){ if(isDesktop()) closeOverlay(); else history.back(); });
/* "Précédent" du navigateur == flèche retour : ferme l'overlay. Sentinelle pour neutraliser le retour depuis la liste. */
history.pushState({owqList:true},'');
window.addEventListener('popstate',function(){ if(!isDesktop() && !overlay.hidden) closeOverlay(); else history.pushState({owqList:true},''); });
/* Init + bascule de breakpoint */
setHeadH();
window.addEventListener('resize',setHeadH);
mqDesktop.addEventListener('change',function(e){
  if(e.matches){ document.body.style.overflow=''; setHeadH(); if(overlay.hidden) showPlaceholder(); }
  else { if(overlay.querySelector('.ov-placeholder')){ overlay.hidden=true; } }
});
if(isDesktop()) showPlaceholder();

    +'<span class="cv-val">'+cv+'</span>'
    +'<button class="cv-btn" data-cv="+" aria-label="Plus de couverts">+</button>'
    +'<span class="cv-hint">ajuste les quantités (recette et courses)</span></div>';
  h+='<div class="recipe-actions">';
  if('wakeLock' in navigator) h+='<button class="act-btn'+(cookMode?' is-on':'')+'" data-cook aria-pressed="'+(cookMode?'true':'false')+'" aria-label="Mode cuisine (garder l’écran allumé)" title="Mode cuisine">'+COOK_SVG+'</button>';
  h+='</div>';
  h+='<div class="bloc"><h3>Ingrédients</h3><ul class="ingr">'+r.ingredients.map(function(i){return '<li>'+scaleIngredientLine(i,cv)+'</li>';}).join('')+'</ul></div>';
  h+='<div class="bloc"><h3>Préparation</h3><ol class="etapes">'+r.etapes.map(function(s){return '<li>'+s+'</li>';}).join('')+'</ol></div>';

function openRecipe(key){
  if(cookMode){ cookMode=false; releaseWake(); }   // nouvelle recette : repartir écran non verrouillé
  renderRecipe(key); openOverlay();
}
/* Construit le HTML de la liste de courses (quantités ajustables, cf. qtyGet/qtySet). */
function coursesInner(wid){
  const data=coursesFor(wid);
  if(!data) return null;
  let h='<p class="hint">Liste calculée à partir des repas conservés. Ajuste une quantité si tu en as déjà : touche le nombre.</p>';
  data.forEach(function(ray){
    h+='<section class="rayon r-'+ray.cls+'"><h2><span class="pip"></span>'+ray.rayon+'</h2><ul>';
    ray.items.forEach(function(it){
      const ck=wid+'§'+ray.cls+'§'+it.n;
      let qHtml='';
      if(typeof it.q==='number'){                                    // quantité numérique -> ajustable
        const buy=qtyGet(wid,ck,it.q);
        qHtml='<button class="course-q edit" data-qedit="1" data-ck="'+ck+'" data-wid="'+wid+'" data-need="'+it.q+'" data-u="'+(it.u||'')+'" data-buy="'+buy+'">'
          +qLabel({q:buy,u:it.u,note:it.note})
          +(buy!==it.q?'<span class="q-need">sur '+qLabel({q:it.q,u:it.u})+'</span>':'')
          +'</button>';
      } else if(it.disp){ qHtml='<span class="course-q">'+it.disp+'</span>'; }
      h+='<li class="course-item'+(coches.has(ck)?' done':'')+'" data-ck="'+ck+'"><span class="check">'+CHECK+'</span>'
        +'<span class="course-nom">'+it.n+'</span>'+qHtml+'</li>';
    });
    h+='</ul></section>';
  });
  return h;
}
function openCourses(wid){
  ovTitle.textContent='Courses · sem. du '+fmt(parseId(wid));
  const h=coursesInner(wid);
  ovBody.innerHTML = h===null ? '<p class="hint">Liste à définir une fois le menu de cette semaine choisi.</p>' : h;
  openOverlay();
}
/* Re-rendu sans réinitialiser le scroll (après ajustement d'une quantité). */
function rerenderCourses(wid){ const top=ovBody.scrollTop; const h=coursesInner(wid); if(h!=null){ ovBody.innerHTML=h; ovBody.scrollTop=top; } }
function startQtyEdit(btn){
  const ck=btn.dataset.ck, wid=btn.dataset.wid, need=+btn.dataset.need, u=btn.dataset.u, buy=+btn.dataset.buy;
  const wrap=document.createElement('span'); wrap.className='q-edit';
  const inp=document.createElement('input'); inp.type='number'; inp.min='0'; inp.step='any'; inp.inputMode='decimal'; inp.value=buy;
  wrap.appendChild(inp); if(u){ const us=document.createElement('span'); us.className='q-unit'; us.textContent=u; wrap.appendChild(us); }
  btn.replaceWith(wrap); inp.focus(); inp.select();
  let done=false;
  function commit(){ if(done) return; done=true; let v=parseFloat(inp.value); if(isNaN(v)||v<0) v=need; qtySet(wid,ck,v,need); rerenderCourses(wid); }
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); inp.blur(); } });
  inp.addEventListener('blur',commit);
}

let genState=null;        // proposition en cours : { wid, tokens, pool:[recettes mappées], menu, used:Set }
let genPoolCache=null;    // cache session du pool (évite un refetch entre régénérations)

function genHistory(){ const raw=store.get('owq.history'); let a=[]; if(raw){ try{ a=JSON.parse(raw)||[]; }catch(e){} } return new Set(a); }
function pushHistory(ids){ const raw=store.get('owq.history'); let a=[]; if(raw){ try{ a=JSON.parse(raw)||[]; }catch(e){} }
  a=ids.concat(a.filter(function(x){ return ids.indexOf(x)===-1; })).slice(0,40); store.set('owq.history', JSON.stringify(a)); }
function usedIdsOf(menu){ const s=new Set(); menu.jours.forEach(function(d){ d.repas.forEach(function(r){ s.add(r.recipe); }); }); return s; }
function recipeById(id){ return genState&&genState.pool ? genState.pool.find(function(r){ return r.id===id; }) : null; }
function setGenMsg(t){ const el=document.getElementById('gen-msg'); if(el) el.textContent=t||''; }
function updateGenOffline(){ const b=document.getElementById('gen-go'); if(!b) return;
  b.disabled=!navigator.onLine; if(!navigator.onLine) setGenMsg('Connexion requise pour générer le menu.'); }

/* Pool = recettes étiquetées "repas" du catalogue owner (base/accompagnement/dessert/non étiqueté exclus),
   détaillées puis mappées. Filtre régime souple. */
function loadPool(){
  if(genPoolCache && genPoolCache.length) return Promise.resolve(genPoolCache);   // ne pas re-servir un pool vide (échec réseau)
  function labelIs(r, val){ return (r.recipeLabels||[]).some(function(l){ return l.label && norm(l.label.title)===val; }); }
  return rsGetRecipes({}).then(function(lite){
    let mains=lite.filter(function(r){ return labelIs(r,'repas'); });
    if(profile.diet){ const d=mains.filter(function(r){ return labelIs(r, profile.diet); });
      if(d.length>=4) mains=d; }                          // filtre régime souple (évite un pool vide)
    return Promise.all(mains.map(function(r){ return rsGetRecipe(r.id).then(rsMapRecipe).catch(function(){ return null; }); }));
  }).then(function(details){ const pool=details.filter(Boolean); if(pool.length) genPoolCache=pool; return pool; });
}
function runGenerate(wid){
  if(!navigator.onLine){ setGenMsg('Connexion requise pour générer le menu.'); return; }
  const ta=document.getElementById('owq-panier'), stock=ta?ta.value:''; store.set('owq.panier.'+wid, stock);
  const btn=document.getElementById('gen-go'); if(btn) btn.disabled=true; setGenMsg('Recherche de recettes…');
  loadPool().then(function(pool){
    if(!pool.length){ setGenMsg('Aucune recette exploitable dans le catalogue.'); if(btn) btn.disabled=false; return; }
    const tokens=tokenize(stock), menu=generateMenu(pool, tokens, {history:genHistory(), rng:Math.random});
    genState={ wid:wid, tokens:tokens, pool:pool, menu:menu };
    renderProposal();
  }).catch(function(e){ setGenMsg('Erreur : '+e.message); if(btn) btn.disabled=false; });
}
function renderProposal(){
  const wid=genState.wid, m=genState.menu;
  let h='<p class="prep-note">Menu proposé pour la semaine du <span class="prep-week">'+fmt(parseId(wid))+'</span>. '
    +'Ouvre une recette (lien), remplace un choix, puis valide.</p>';
  m.jours.forEach(function(day,di){ const d=addDays(parseId(wid),di);
    h+='<div class="gen-day"><div class="gen-day-h">'+JOURS[d.getDay()]+' '+fmt(d)+'</div>';
    if(!day.repas.length) h+='<div class="repas-vide">—</div>';
    day.repas.forEach(function(ref,ri){ const r=recipeById(ref.recipe);
      h+='<div class="gen-repas"><span class="gen-moment '+(ri===0?'midi':'soir')+'">'+(ri===0?'Midi':'Soir')+'</span>'
        +'<a class="gen-titre" href="https://recipesage.com/app/recipe/'+ref.recipe+'" target="_blank" rel="noopener">'+(r?r.titre:ref.recipe)+'</a>'
        +'<button class="gen-reroll" data-reroll="'+di+'-'+ri+'" aria-label="Proposer une autre recette" title="Proposer une autre">'+REROLL_SVG+'</button></div>';
    });
    h+='</div>';
  });
  h+='<button class="btn-primary" id="gen-validate">Valider la semaine</button>';
  h+='<button class="btn-secondary" id="gen-back">Changer les ingrédients</button>';
  ovBody.innerHTML=h;
}
function rerollSlot(di,ri){
  if(!genState) return; const ref=genState.menu.jours[di].repas[ri]; if(!ref) return;
  const alt=pickAlternative(genState.pool, genState.tokens, usedIdsOf(genState.menu), {rng:Math.random});
  if(alt && alt!==ref.recipe){ ref.recipe=alt; renderProposal(); }
}
function validateGen(){
  if(!genState) return; const wid=genState.wid, menu=genState.menu, used=usedIdsOf(menu);
  const cache=loadRecipesCache(); used.forEach(function(id){ const r=recipeById(id); if(r) cache[id]=r; }); saveRecipesCache(cache);
  const gen=loadGenMenus(); gen[wid]={jours:menu.jours}; saveGenMenus(gen);
  pushHistory(Array.from(used));
  rebuild();
  deductStock(wid, store.get('owq.panier.'+wid)||'');       // pré-déduit le stock saisi de la liste de courses
  rerenderPlanning(); genState=null; closeOverlay();
  setStatus('Menu généré ✓', true); setTimeout(clearStatus, 3000);
}
/* Déduit le stock saisi des quantités à acheter (owq.qty), quand nom + unité concordent. */
function parseStock(str){ return splitItems(str).map(function(part){ const p=parseQty(part);
    return { name:norm(p.name), qty:p.qty, unit:p.unit }; }).filter(function(x){ return x.name; }); }
function deductStock(wid, stockStr){
  const data=coursesFor(wid); if(!data) return; const stock=parseStock(stockStr); if(!stock.length) return;
  data.forEach(function(ray){ ray.items.forEach(function(it){
    if(typeof it.q!=='number') return; const nn=' '+norm(it.n)+' ';
    const s=stock.find(function(x){ return x.qty!=null && (x.unit||'')===(it.u||'') &&
      (nn.indexOf(' '+x.name+' ')!==-1 || (' '+x.name+' ').indexOf(nn)!==-1); });   // concordance par mot entier
    if(s) qtySet(wid, wid+'§'+ray.cls+'§'+it.n, Math.max(0, it.q - s.qty), it.q);
  }); });
}

/* ============================ Réglages (profil utilisateur) ============================ */
function openSettings(){
  ovTitle.textContent='Réglages';
  const dietOpts=DIETS.map(function(d){ return '<option value="'+d[0]+'"'+(d[0]===profile.diet?' selected':'')+'>'+d[1]+'</option>'; }).join('');
  const dayOpts=JOURS.map(function(name,idx){ return '<option value="'+idx+'"'+(idx===profile.weekStart?' selected':'')+'>'+name+'</option>'; }).join('');
  let h='<p class="prep-note">Ces réglages personnalisent l’application et sont enregistrés sur cet appareil.</p>';
  h+='<div class="field"><label>Régime alimentaire</label><select id="set-diet">'+dietOpts+'</select></div>';
  h+='<div class="field"><label>Couverts par défaut</label><input id="set-couverts" type="number" min="1" step="1" inputmode="numeric" value="'+profile.couverts+'"></div>';
  h+='<div class="field"><label>Début de la semaine alimentaire</label><select id="set-weekstart">'+dayOpts+'</select></div>';
  h+='<button class="btn-primary" id="set-save">Enregistrer</button>';
  h+='<div class="prep-ok" id="set-ok"></div>';
  ovBody.innerHTML=h; openOverlay();
}
function saveSettings(){
  const diet=(document.getElementById('set-diet')||{}).value||'';
  let cv=parseInt((document.getElementById('set-couverts')||{}).value,10); if(isNaN(cv)||cv<1) cv=1;
  let ws=parseInt((document.getElementById('set-weekstart')||{}).value,10); if(isNaN(ws)||ws<0||ws>6) ws=4;
  profile={diet:diet, couverts:cv, weekStart:ws}; saveProfile(profile);
  genPoolCache=null;   // le régime a pu changer -> invalider le pool en cache
  const ok=document.getElementById('set-ok'); if(ok) ok.textContent='Enregistré ✓';
  resetPlanning();
}
/* Ré-affiche tout le planning (après changement de début de semaine). */
function resetPlanning(){
  planning.innerHTML=''; daysRendered=0; loading=false; cursor=sow(today);
  appendDays(21);
  const el=document.getElementById('day-'+idOf(today)); if(el) el.scrollIntoView({block:'start'});
}

/* ============================ Événements ============================ */
planning.addEventListener('click',function(e){
  if(suppressClick) return;
  const act=e.target.closest('.row-action');
  if(act){ const row=act.closest('.repas-row'); setDeleted(row.dataset.key, !deleted.has(row.dataset.key)); return; }
  const main=e.target.closest('.repas-main');
  if(main){ openRecipe(main.closest('.repas-row').dataset.key); return; }
  const pb=e.target.closest('.prep-btn');
  if(pb){ openGenerate(pb.dataset.prepare); return; }
  const cb=e.target.closest('.courses-btn');
  if(cb){ openCourses(cb.dataset.courses); }
});
ovBody.addEventListener('click',function(e){
  const cook=e.target.closest('[data-cook]');
  if(cook){ setCookMode(!cookMode); return; }
  const gg=e.target.closest('#gen-go');
  if(gg){ runGenerate(gg.dataset.wid); return; }
  const gv=e.target.closest('#gen-validate');
  if(gv){ validateGen(); return; }
  const gbk=e.target.closest('#gen-back');
  if(gbk){ if(genState) openGenerate(genState.wid); return; }
  const rr=e.target.closest('[data-reroll]');
  if(rr){ const rp=rr.dataset.reroll.split('-'); rerollSlot(+rp[0],+rp[1]); return; }
  const cvb=e.target.closest('[data-cv]');
  if(cvb){ const cont=cvb.closest('[data-cvkey]');
    if(cont){ const key=cont.dataset.cvkey, kk=parseKey(key);
      let val=couvertsGet(kk.wid,kk.di,kk.ri)+(cvb.dataset.cv==='+'?1:-1); if(val<1) val=1; couvertsSet(kk.wid,kk.di,kk.ri,val);
      refreshDay(addDays(parseId(kk.wid),kk.di));
      const top=ovBody.scrollTop; renderRecipe(key); ovBody.scrollTop=top; }   // ré-affiche quantités recette + cv-val
    return; }
  const ss=e.target.closest('#set-save');
  if(ss){ saveSettings(); return; }
  const qe=e.target.closest('[data-qedit]');
  if(qe){ startQtyEdit(qe); return; }                          // éditer la quantité
  if(e.target.closest('.q-edit')) return;                      // clic dans l'éditeur : ne pas cocher
  const it=e.target.closest('.course-item');
  if(it){ const k=it.dataset.ck; if(coches.has(k))coches.delete(k);else coches.add(k); it.classList.toggle('done'); saveSet('owq.checked',coches); return; }
  const db=e.target.closest('.del-btn');
  if(db){ const key=db.dataset.delkey, del=!deleted.has(key); setDeleted(key,del);
    db.classList.toggle('is-del',del);
    db.textContent=del?'↩ Rétablir ce repas':'✕ Je mange à l’extérieur — retirer ce repas'; }
});

/* Bouton flottant : revenir à aujourd’hui */
document.getElementById('today-fab').addEventListener('click',function(){
  const el=document.getElementById('day-'+idOf(today));
  if(el) el.scrollIntoView({block:'start',behavior:'smooth'});
});

/* Réglages (profil) */
document.getElementById('owq-settings').addEventListener('click',openSettings);

/* ============================ Édition à la volée : drag'n'drop (échange de positions) ============================ */
function parseKey(k){ const p=k.split(':'), idx=p[1].split('-'); return {wid:p[0], di:+idx[0], ri:+idx[1]}; }
function swapDeleted(a,b){ const da=deleted.has(a), db=deleted.has(b);
  if(da!==db){ if(da){deleted.delete(a);deleted.add(b);} else {deleted.delete(b);deleted.add(a);} saveSet('owq.deleted',deleted); } }
function swapCouverts(a,b){ const ca=couvertsMap[a], cb=couvertsMap[b];   // suit les repas déplacés
  if(ca===cb) return;
  if(cb!==undefined) couvertsMap[a]=cb; else delete couvertsMap[a];
  if(ca!==undefined) couvertsMap[b]=ca; else delete couvertsMap[b];
  store.set('owq.couverts', JSON.stringify(couvertsMap)); }
function refreshDay(d){ const el=document.getElementById('day-'+idOf(d)); if(el){ const t=document.createElement('div'); t.innerHTML=dayCard(d); el.replaceWith(t.firstElementChild); } }
function doSwap(srcKey,tgtKey){
  const a=parseKey(srcKey), b=parseKey(tgtKey);
  if(a.wid!==b.wid) return;                        // échange au sein d'une même semaine
  const wid=a.wid, base=JSON.stringify(RAW_MENUS[wid]||null);
  const ov=loadOverrides();
  const src=(ov[wid]&&ov[wid].base===base)?ov[wid].jours:(RAW_MENUS[wid]?RAW_MENUS[wid].jours:null);
  if(!src) return;
  const jours=JSON.parse(JSON.stringify(src));
  const t=jours[a.di].repas[a.ri]; jours[a.di].repas[a.ri]=jours[b.di].repas[b.ri]; jours[b.di].repas[b.ri]=t;
  ov[wid]={base:base, jours:jours}; saveOverrides(ov);
  swapDeleted(srcKey,tgtKey); swapCouverts(srcKey,tgtKey);
  MENUS=materializeMenus(applyOverrides(RAW_MENUS), R);
  refreshDay(addDays(parseId(wid),a.di)); if(b.di!==a.di) refreshDay(addDays(parseId(wid),b.di));
}
let drag=null, dragTimer=null, suppressClick=false;
const LONGPRESS=320, MOVE_CANCEL=10;
function targetRowAt(x,y){ const el=document.elementFromPoint(x,y); return el?el.closest('.repas-row'):null; }
function moveGhost(x,y){ if(drag&&drag.ghost) drag.ghost.style.transform='translate('+(x+8)+'px,'+(y-16)+'px)'; }
function setDropTarget(t){ const prev=planning.querySelector('.drop-target'); if(prev&&prev!==t) prev.classList.remove('drop-target'); if(t&&drag&&t!==drag.row) t.classList.add('drop-target'); }
function endDragCleanup(){ if(!drag) return; if(drag.ghost) drag.ghost.remove(); if(drag.row) drag.row.classList.remove('dragging'); const dt=planning.querySelector('.drop-target'); if(dt) dt.classList.remove('drop-target'); document.body.classList.remove('dragging-active'); drag=null; }
function armDrag(x,y){
  if(!drag) return; drag.armed=true; dragTimer=null;
  const g=document.createElement('div'); g.className='drag-ghost';
  const t=drag.row.querySelector('.repas-row-titre'); g.textContent=t?t.textContent:'';
  document.body.appendChild(g); drag.ghost=g;
  drag.row.classList.add('dragging'); document.body.classList.add('dragging-active');
  moveGhost(x,y); if(navigator.vibrate){ try{ navigator.vibrate(25); }catch(e){} }
}
/* Appui long sur une ligne = déplacer ; tap = ouvrir la recette ; glissement avant l'appui long = scroll. */
planning.addEventListener('pointerdown',function(e){
  if(e.pointerType==='mouse' && e.button!==0) return;
  if(e.target.closest('.row-action')) return;
  const row=e.target.closest('.repas-row'); if(!row) return;
  drag={row:row, key:row.dataset.key, x:e.clientX, y:e.clientY, armed:false};
  dragTimer=setTimeout(function(){ armDrag(e.clientX,e.clientY); }, LONGPRESS);
});
window.addEventListener('pointermove',function(e){
  if(!drag) return;
  if(!drag.armed){
    if(Math.abs(e.clientX-drag.x)>MOVE_CANCEL || Math.abs(e.clientY-drag.y)>MOVE_CANCEL){ clearTimeout(dragTimer); dragTimer=null; drag=null; }
    return;
  }
  moveGhost(e.clientX,e.clientY);
  setDropTarget(targetRowAt(e.clientX,e.clientY));
  const m=70, h=window.innerHeight;
  if(e.clientY<m) window.scrollBy(0,-14); else if(e.clientY>h-m) window.scrollBy(0,14);
});
/* Sur tactile, seul preventDefault sur touchmove bloque le scroll natif pendant le drag (touch-action ne suffit pas une fois le geste commence). */
window.addEventListener('touchmove',function(e){ if(drag&&drag.armed) e.preventDefault(); },{passive:false});
window.addEventListener('pointerup',function(e){
  if(!drag) return;
  if(dragTimer){ clearTimeout(dragTimer); dragTimer=null; }
  if(drag.armed){
    const src=drag.key, t=targetRowAt(e.clientX,e.clientY), tgt=(t&&t.dataset.key)||null;
    endDragCleanup(); suppressClick=true; setTimeout(function(){ suppressClick=false; },60);
    if(tgt && tgt!==src) doSwap(src,tgt);
  } else { drag=null; }
});
window.addEventListener('pointercancel',function(){ if(dragTimer){ clearTimeout(dragTimer); dragTimer=null; } endDragCleanup(); });

/* Service worker (HTTPS uniquement, ex. GitHub Pages) */
if('serviceWorker' in navigator){ window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
